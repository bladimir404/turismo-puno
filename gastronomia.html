<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastronomía — Turismo Puno</title>
    <meta name="description" content="Trucha, cuy chactado, chuño, moraya, pesque de quinua, api con pastel y mazamorra de calabaza.">
    <meta property="og:title" content="Sabores de Puno">
    <meta property="og:description" content="Recetas típicas del altiplano peruano.">
    <meta property="og:type" content="website">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

        </div>
